<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Responsive To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">📋 TaskFlow</h1>
                <p class="app-subtitle">Stay organized and productive</p>
                <button id="logoutBtn" class="logout-btn" title="Logout">
                    <span class="logout-icon">🚪</span>
                    Logout
                </button>
            </div>
        </header>

        <!-- Main App -->
        <main class="main">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Filters</h3>
                    <ul class="filter-list">
                        <li>
                            <button class="filter-btn active" data-filter="all">
                                <span class="filter-icon">📂</span>
                                <span>All Tasks</span>
                                <span class="filter-count" id="count-all">0</span>
                            </button>
                        </li>
                        <li>
                            <button class="filter-btn" data-filter="active">
                                <span class="filter-icon">⏳</span>
                                <span>Active</span>
                                <span class="filter-count" id="count-active">0</span>
                            </button>
                        </li>
                        <li>
                            <button class="filter-btn" data-filter="completed">
                                <span class="filter-icon">✅</span>
                                <span>Completed</span>
                                <span class="filter-count" id="count-completed">0</span>
                            </button>
                        </li>
                    </ul>
                </div>

                <div class="sidebar-section">
                    <h3 class="sidebar-title">Categories</h3>
                    <ul class="category-list" id="categoryList">
                        <!-- Dynamically populated -->
                    </ul>
                </div>

                <div class="sidebar-section">
                    <h3 class="sidebar-title">Sort By</h3>
                    <select class="sort-select" id="sortSelect">
                        <option value="date-asc">Due Date (Nearest)</option>
                        <option value="date-desc">Due Date (Latest)</option>
                        <option value="created">Recently Created</option>
                    </select>
                </div>
            </aside>

            <!-- Content Area -->
            <section class="content">
                <!-- Input Section -->
                <div class="input-section">
                    <h2>Add New Task</h2>
                    <form id="taskForm" class="task-form">
                        <div class="form-group">
                            <input
                                type="text"
                                id="taskInput"
                                placeholder="What needs to be done?"
                                class="task-input"
                                required
                            >
                            <span class="error-message" id="taskError"></span>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="categoryInput">Category</label>
                                <input
                                    type="text"
                                    id="categoryInput"
                                    placeholder="e.g., Work, Personal"
                                    class="category-input"
                                >
                            </div>

                            <div class="form-group">
                                <label for="dueDateInput">Due Date</label>
                                <input
                                    type="date"
                                    id="dueDateInput"
                                    class="date-input"
                                >
                            </div>

                            <button type="submit" class="add-btn">
                                <span class="btn-icon">+</span>
                                Add Task
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Stats Section -->
                <div class="stats-section">
                    <div class="stat-card">
                        <div class="stat-label">Total Tasks</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Tasks</div>
                        <div class="stat-value" id="statActive">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Overdue Tasks</div>
                        <div class="stat-value overdue" id="statOverdue">0</div>
                    </div>
                </div>

                <!-- Tasks List Section -->
                <div class="tasks-section">
                    <div class="tasks-header">
                        <h2 id="tasksTitle">All Tasks</h2>
                        <div id="clearBtn" class="clear-btn" title="Clear completed tasks">
                            🗑️ Clear Completed
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p class="empty-title">No tasks yet</p>
                        <p class="empty-subtitle">Create your first task to get started!</p>
                    </div>

                    <!-- Tasks List -->
                    <ul id="tasksList" class="tasks-list">
                        <!-- Tasks will be rendered here -->
                    </ul>
                </div>
            </section>
        </main>

        <!-- Edit Modal -->
        <div id="editModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Task</h3>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <form id="editForm" class="task-form">
                    <div class="form-group">
                        <label for="editTaskInput">Task Title</label>
                        <input
                            type="text"
                            id="editTaskInput"
                            class="task-input"
                            required
                        >
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="editCategoryInput">Category</label>
                            <input
                                type="text"
                                id="editCategoryInput"
                                class="category-input"
                            >
                        </div>

                        <div class="form-group">
                            <label for="editDueDateInput">Due Date</label>
                            <input
                                type="date"
                                id="editDueDateInput"
                                class="date-input"
                            >
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
