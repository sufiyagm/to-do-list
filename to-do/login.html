<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TaskFlow</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Login Card -->
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Sign in to your TaskFlow account</p>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="error-banner hidden">
                <span class="error-icon">⚠️</span>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" novalidate>
                <div class="form-group">
                    <label for="emailInput" class="form-label">Email or Username</label>
                    <input
                        type="text"
                        id="emailInput"
                        class="form-input"
                        placeholder="Enter your email or username"
                        autocomplete="username"
                        required
                        aria-describedby="emailError"
                    >
                    <span class="error-message" id="emailError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label for="passwordInput" class="form-label">Password</label>
                    <div class="password-input-container">
                        <input
                            type="password"
                            id="passwordInput"
                            class="form-input"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                            aria-describedby="passwordError"
                        >
                        <button
                            type="button"
                            id="togglePassword"
                            class="password-toggle"
                            aria-label="Toggle password visibility"
                        >
                            <span class="toggle-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError" role="alert"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input
                            type="checkbox"
                            id="rememberMe"
                            class="checkbox-input"
                        >
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>

                    <a href="#" class="forgot-password-link" id="forgotPassword">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" id="loginButton" class="login-button">
                    <span class="button-text">Sign In</span>
                    <div class="loading-spinner hidden">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <!-- Sign Up Link -->
            <div class="signup-section">
                <p class="signup-text">
                    Don't have an account?
                    <a href="#" class="signup-link" id="signUpLink">Sign up</a>
                </p>
            </div>
        </div>

        <!-- Background Elements -->
        <div class="background-elements">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
